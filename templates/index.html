<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08080d">
    <title>CineBot — Movie Discovery</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Pre-warm TMDB image CDN connection -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
    <link rel="dns-prefetch" href="https://image.tmdb.org">
    <!-- Pre-warm connections to streaming sources so first-load is faster -->
    <link rel="dns-prefetch" href="https://vidsrc.me">
    <link rel="dns-prefetch" href="https://embed.su">
    <link rel="dns-prefetch" href="https://vidlink.pro">
    <link rel="dns-prefetch" href="https://vidsrc.xyz">
</head>
<body class="no-hero">

    <header>
        <button class="logo" id="logo-home" aria-label="Go to home">
            <i class="fa-solid fa-film"></i>
            <span class="logo-cine">Cine</span><span class="logo-bot">Bot</span>
        </button>
        <div class="header-actions">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search" placeholder="Search movies…" autocomplete="off" spellcheck="false">
                <button id="search-clear" class="search-clear" aria-label="Clear search" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                <div id="search-suggestions" class="search-suggestions" style="display:none;"></div>
            </div>
            <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- Cinematic hero -->
    <section id="hero" style="display:none;">
        <img id="hero-img" src="" alt="" class="hero-img">
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content"></div>
    </section>

    <!-- Sticky controls bar (sort tabs + genre pills + year) -->
    <div class="controls-bar">
        <div class="controls-top">
            <!-- Movies / TV toggle -->
            <div class="type-toggle" id="type-toggle">
                <button class="type-btn active" data-type="movie">
                    <i class="fa-solid fa-film"></i> Movies
                </button>
                <button class="type-btn" data-type="tv">
                    <i class="fa-solid fa-tv"></i> TV Shows
                </button>
                <button class="type-btn" data-type="anime">
                    <i class="fa-solid fa-torii-gate"></i> Anime
                </button>
            </div>

            <nav class="sort-tabs" id="sort-tabs" aria-label="Sort options">
                <button class="sort-tab active" data-sort="popularity.desc">
                    <i class="fa-solid fa-fire-flame-curved"></i> Popular
                </button>
                <button class="sort-tab" data-sort="vote_average.desc">
                    <i class="fa-solid fa-medal"></i> Top Rated
                </button>
                <button class="sort-tab" data-sort="primary_release_date.desc" data-tv-sort="first_air_date.desc">
                    <i class="fa-solid fa-clapperboard"></i> New Releases
                </button>
                <button class="sort-tab" data-sort="trending.day">
                    <i class="fa-solid fa-bolt-lightning"></i> Today
                </button>
                <button class="sort-tab" data-sort="trending.week">
                    <i class="fa-solid fa-arrow-trend-up"></i> This Week
                </button>
            </nav>
            <div class="year-filter">
                <div class="year-display">
                    <i class="fa-regular fa-calendar"></i>
                    <span id="year-from-val">1990</span>
                    <span class="year-sep">–</span>
                    <span id="year-to-val">2026</span>
                </div>
                <div class="year-sliders">
                    <input type="range" id="year-from" min="1950" max="2026" value="1990" aria-label="From year">
                    <input type="range" id="year-to"   min="1950" max="2026" value="2026" aria-label="To year">
                </div>
                <button id="reset-filters" class="reset-btn" title="Reset all filters">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
            </div>
        </div>
        <div class="controls-bottom">
            <div class="genre-pills-scroll">
                <div class="genre-pills" id="genre-pills">
                    <button class="genre-pill active" data-id="">All</button>
                    <button class="genre-pill my-list-pill" data-id="watchlist">
                        <i class="fa-solid fa-heart"></i> My List
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- In Theatres row (movies now playing) -->
    <div id="now-playing-section" class="now-playing-section" style="display:none;">
        <div class="section-row-header">
            <span class="section-row-title"><i class="fa-solid fa-ticket"></i> In Theatres</span>
        </div>
        <div id="now-playing-row" class="now-playing-row"></div>
    </div>

    <!-- Continue Watching row (shown only when history exists) -->
    <div id="continue-section" class="continue-section" style="display:none;">
        <div class="continue-header">
            <span class="continue-title"><i class="fa-solid fa-clock-rotate-left"></i> Continue Watching</span>
            <button id="clear-history" class="clear-history-btn">Clear</button>
        </div>
        <div id="continue-row" class="continue-row"></div>
    </div>

    <main>
        <div id="results-grid" class="results-grid"></div>
        <div id="scroll-sentinel" style="height:1px;"></div>
        <div id="load-more-wrap" class="load-more-wrap">
            <button id="load-more-btn" class="load-more-btn">
                <i class="fa-solid fa-chevron-down"></i> Load More
            </button>
        </div>
    </main>

    <!-- Movie detail modal -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <button id="modal-back" class="modal-back-btn" style="display:none;" aria-label="Go back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button class="close-btn" aria-label="Close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Trailer Modal -->
    <div id="trailer-modal" class="trailer-modal">
        <div class="trailer-shell">
            <button id="trailer-close" class="trailer-close" aria-label="Close trailer"><i class="fa-solid fa-xmark"></i></button>
            <div class="trailer-frame-wrap">
                <iframe id="trailer-iframe" class="trailer-iframe" allowfullscreen
                    allow="autoplay; fullscreen; picture-in-picture" src=""></iframe>
            </div>
        </div>
    </div>

    <!-- Streaming Player Overlay -->
    <div id="player-overlay" class="player-overlay">
        <div id="player-bg" class="player-bg"></div>
        <div class="player-shell">

            <!-- Slim top bar: title + action buttons only -->
            <div class="player-header">
                <div class="player-header-left">
                    <span id="player-title" class="player-title"></span>
                    <span id="player-quality" class="player-quality-badge" style="display:none;"></span>
                </div>
                <div class="player-settings-wrap" id="player-settings-wrap">
                    <button id="player-settings-btn" class="player-settings-btn" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <div id="player-settings-menu" class="player-settings-menu" style="display:none;">
                        <div class="settings-menu-title">Player Settings</div>
                        <label class="settings-menu-item" id="player-sub-btn">
                            <i class="fa-solid fa-closed-captioning"></i>
                            <span id="sub-menu-label">Upload Subtitles</span>
                            <input type="file" id="player-sub-input" accept=".srt,.vtt" style="display:none;">
                        </label>
                    </div>
                </div>
                <button id="player-pip" class="player-pip-btn" title="Picture-in-Picture">
                    <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
                </button>
                <button id="player-close" class="player-close" aria-label="Close player">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="player-hint" class="player-hint" style="display:none;"></div>
            <div id="player-status" class="player-status" style="display:none;"></div>

            <!-- Auto-next episode overlay -->
            <div id="player-autonext" class="player-autonext" style="display:none;">
                <div class="player-autonext-card">
                    <div class="autonext-label">Up Next</div>
                    <div id="autonext-ep-label" class="autonext-ep-label"></div>
                    <div class="autonext-row">
                        <button id="autonext-play" class="autonext-play-btn">Play Now</button>
                        <button id="autonext-cancel" class="autonext-cancel-btn">Cancel <span id="autonext-countdown">15</span></button>
                    </div>
                </div>
            </div>

            <!-- Video — fills all remaining height -->
            <div class="player-frame-wrap">
                <iframe id="player-iframe" class="player-iframe"
                    allowfullscreen
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media; accelerometer; gyroscope"
                    src=""></iframe>
                <div id="player-subtitles" class="player-subtitles"></div>
                <div id="player-sub-controls" class="player-sub-controls" style="display:none;">
                    <span id="sub-filename" class="sub-filename"></span>
                    <div class="sub-offset-group">
                        <button id="sub-offset-minus" class="sub-offset-btn" title="Delay -0.5s">−0.5s</button>
                        <span id="sub-offset-display" class="sub-offset-display">0.0s</span>
                        <button id="sub-offset-plus"  class="sub-offset-btn" title="Delay +0.5s">+0.5s</button>
                    </div>
                    <button id="sub-remove-btn" class="sub-remove-btn" title="Remove subtitles">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <!-- Controls bar below video: server tabs + episode picker -->
            <div class="player-controls-bar">
                <div class="player-controls-left">
                    <span class="server-label"><i class="fa-solid fa-server"></i> Select Server</span>
                    <div class="player-sources">
                        <button class="player-src-btn active" title="vidsrc.me">
                            <i class="fa-solid fa-circle-play"></i> Server 1
                        </button>
                        <button class="player-src-btn" title="embed.su">
                            <i class="fa-solid fa-circle-play"></i> Server 2
                        </button>
                        <button class="player-src-btn" title="vidlink.pro">
                            <i class="fa-solid fa-circle-play"></i> Server 3
                        </button>
                        <button class="player-src-btn" title="vidsrc.xyz">
                            <i class="fa-solid fa-circle-play"></i> Server 4
                        </button>
                    </div>
                </div>
                <div id="player-ep-picker" class="player-ep-picker" style="display:none;">
                    <span class="ep-picker-label"><i class="fa-solid fa-tv"></i> Episode</span>
                    <label class="ep-label">S
                        <input id="player-season" class="ep-input" type="number" min="1" value="1">
                    </label>
                    <label class="ep-label">E
                        <input id="player-episode" class="ep-input" type="number" min="1" value="1">
                    </label>
                    <button id="player-ep-go" class="ep-go-btn">Go</button>
                    <button id="player-next-ep" class="player-next-ep-btn" title="Next Episode">
                        <i class="fa-solid fa-forward-step"></i> Next
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- PWA install bar (shown by JS when browser fires beforeinstallprompt) -->
    <div id="install-bar" style="display:none;" class="install-bar">
        <div class="install-bar-left">
            <i class="fa-solid fa-film install-bar-icon"></i>
            <div>
                <div class="install-bar-title">Install CineBot</div>
                <div class="install-bar-sub">Add to home screen for the full app experience</div>
            </div>
        </div>
        <div class="install-bar-actions">
            <button class="install-btn" onclick="triggerInstall()">Install</button>
            <button class="install-dismiss" onclick="document.getElementById('install-bar').style.display='none'" aria-label="Dismiss">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <button id="scroll-top" class="scroll-top-btn" aria-label="Back to top" style="display:none;">
        <i class="fa-solid fa-arrow-up"></i>
    </button>
    <div id="toast-container"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>

    <script>
    // ── Service Worker registration (enables PWA install on Android/Chrome) ──
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/static/sw.js")
                .catch(err => console.warn("SW registration failed:", err));
        });
    }

    // ── Install prompt ("Add to Home Screen" banner) ──────────────────────────
    let _deferredInstall = null;
    window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault();
        _deferredInstall = e;
        const bar = document.getElementById("install-bar");
        if (bar) bar.style.display = "flex";
    });
    window.addEventListener("appinstalled", () => {
        const bar = document.getElementById("install-bar");
        if (bar) bar.style.display = "none";
        _deferredInstall = null;
    });
    function triggerInstall() {
        if (_deferredInstall) {
            _deferredInstall.prompt();
            _deferredInstall.userChoice.then(() => { _deferredInstall = null; });
        }
        const bar = document.getElementById("install-bar");
        if (bar) bar.style.display = "none";
    }
    </script>
</body>
</html>
