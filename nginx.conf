# Nginx config for CineBot on a VPS
# Place at: /etc/nginx/sites-available/cinebot
# Enable: sudo ln -s /etc/nginx/sites-available/cinebot /etc/nginx/sites-enabled/
# SSL:    sudo certbot --nginx -d yourdomain.com

# Rate limiting zone — 30 requests/minute per IP
limit_req_zone $binary_remote_addr zone=cinebot:10m rate=30r/m;

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Certbot will add SSL redirect here automatically
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — filled in by: sudo certbot --nginx -d yourdomain.com
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Gzip text responses
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # Serve static files directly — Nginx is ~10× faster than Flask for this
    location /static/ {
        alias /home/appuser/cinebot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy everything else to Gunicorn
    location / {
        limit_req zone=cinebot burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
